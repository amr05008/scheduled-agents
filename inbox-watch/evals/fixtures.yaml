# Synthetic email fixtures for the inbox-watch eval suite.
#
# All addresses, names, subjects, and snippets are made up. NO REAL PII.
# Each fixture mimics what mcp__claude_ai_Gmail__get_thread would return
# for one new unread thread.
#
# Fields:
#   id           — stable identifier (sortable). Pad to 3 digits.
#   from         — sender (display name + email)
#   to           — recipient
#   subject      — subject line
#   snippet      — first ~200 chars of body
#   labels       — Gmail labels already on the thread (e.g., wami,
#                  CATEGORY_PROMOTIONS)
#   list_unsub   — true if List-Unsubscribe header present
#   thread_age   — "fresh" | "1d" | "3d" — how recent
#
# The eval-runner classifies each per triage-heuristics.md and compares
# to expected.yaml. Adding a fixture: pick a unique id, add to both files.

